# Produktion – zieht Images von GHCR statt lokal zu bauen.
# Verwendung:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# GHCR_OWNER = 2tap2b (GitHub-Benutzername wird für GHCR klein geschrieben)

services:
  frontend:
    image: ghcr.io/2tap2b/lernapp-frontend:latest
    ports:
      - "9980:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ghcr.io/2tap2b/lernapp-backend:latest
    ports:
      - "3333:3001"
    environment:
      - DATABASE_URL=file:/app/data/lernapp.db
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    volumes:
      - lernapp_db:/app/data
    restart: unless-stopped

volumes:
  lernapp_db:
    driver: local
